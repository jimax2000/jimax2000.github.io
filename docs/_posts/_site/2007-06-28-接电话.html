<p>爸爸打电话回去给笑笑，笑笑接到电话就说：&quot;爸爸给我买个DVD吧，那个VCD梦水乡都放不出来的&quot;，说完就把电话撂下了。好几天都是这句话。 梦水乡是兴化的市歌，家里有张DVD的碟，笑笑特别爱听这歌，以前在家里是用电脑放的，在北京也用DVD机放过。但现在家里的电脑笑笑叔叔老用着，另外只有台VCD的机器，放不出来，笑笑想听啊，爷爷奶奶就说让爸爸给你买个DVD吧，所以每次打电话都不忘记提醒爸爸一下，呵呵</p>
<p>过了几天，变成：&quot;爸爸给我买个摩托车吧&quot;，可能是看到楼下的其他小朋友有小车骑了；又过了几天，变成：&quot;我把叔叔的眼睛弄坏了，爸爸给我赔给叔叔吧...&quot;</p>
