<p>&lt;p id="msgcns!4E68F29B11E26320!106" class="bvMsg"&gt;小女儿问：“爸爸，太阳、月亮和星星是什么？”爸爸回答：“吉祥三宝”。小女儿问：“妈妈，绿叶、花朵和果实是什么？”妈妈回答：“吉祥三宝”。小女儿问：“爸爸、妈妈和我是什么？”爸爸：“吉祥三宝”。爸爸、妈妈、女儿：吉祥三宝，永远吉祥。早上交通台里听到这首歌，觉得真好听。晚上在网上找到了Flash, wma，又好好欣赏了欣赏。</p>

<p>我的女儿43天了， 那个Flash写着：FAMILY = Father And Mother, I Love You, 但愿吉祥三宝，永远吉祥。</p>
