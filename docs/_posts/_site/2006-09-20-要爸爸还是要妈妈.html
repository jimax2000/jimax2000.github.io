<p>这两天笑笑和新的阿姨不熟悉，就总是说&quot;不要阿姨&quot;，&quot;要爸爸&quot;，&quot;要妈妈&quot;之类的。爸爸就总是逗笑笑说：&quot;要爸爸还是要妈妈？&quot;，笑笑说：&quot;要妈妈&quot;，爸爸就说：&quot;那不要爸爸啦，爸爸走啦。&quot;，笑笑连忙说&quot;要爸爸&quot;。妈妈在一边说：&quot;不要妈妈啦，妈妈走啦&quot;。笑笑这下进入两难境地了。不过这可难不倒我们聪明的笑笑，笑笑两次成功得把爸爸妈妈逗笑了。</p>
<p>第一次，笑笑说：&quot;要爸妈&quot;。呵呵，一个也不能少...</p>
<p>第二次更绝，笑笑说：&quot;宝宝走...&quot;。哈哈，爸爸妈妈你们谁也别走，还是我走吧...</p>
