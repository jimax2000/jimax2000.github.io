<p>两类典型对话：</p>
<p>A. 我做错事了, 比如尿在裤子上了，把东西摔到地上了</p>
<p>爸爸：&quot;这事做得对不对？&quot;</p>
<p>笑笑：&quot;不对&quot;</p>
<p>爸爸：&quot;该怎么办啊？&quot;</p>
<p>笑笑：&quot;打屁屁&quot;</p>
<p>爸爸：&quot;那让爸爸打吧&quot;</p>
<p>笑笑：&quot;不打&quot;</p>
<p>爸爸：&quot;那下次不要做了，好不好？&quot;</p>
<p>笑笑：&quot;好&quot;</p>
<p>不过我下次还做...呵呵...</p>
<p>B. 我弄坏东西了，比如把书撕坏了，把兔杯的耳朵摔断了</p>
<p>爸爸：&quot;这事做得对不对？&quot;</p>
<p>笑笑：&quot;不对&quot;</p>
<p>爸爸：&quot;该怎么办啊？&quot;</p>
<p>笑笑：&quot;爸爸修&quot;</p>
<p>爸爸... 没脾气了...</p>
<p>妈妈在一边说：&quot;你以为你爸是万能的啊？&quot;</p>
<p><br /></p>
