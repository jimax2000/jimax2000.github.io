<p>今天我和妈妈从内蒙回来啦。下午爸爸妈妈带我去找幼儿园，想看看是否能把我放在幼儿园里。</p>
<p>幼儿园里挺好玩的，有个扭扭车，人坐在上面，腿也翘在上面，前面的方向盘一扭一扭就可以走了，我从来没玩过啊，可是我一学就会了。</p>
<p>有个小姐姐可喜欢我了，把小车让给我玩，然后和我爸爸说：&quot;我当她妈妈，你当她爸爸，好吗？&quot;，爸爸一听就晕了，呵呵</p>
<p>最后要走啦，妈妈抱着我，说和幼儿园的阿姨再见吧，我就挥挥手，妈妈说来个飞吻吧，结果我把手掌在爸爸嘴上拍了拍，然后再飞出去。这可是第一次，妈妈也晕了，说：&quot;你看出爸爸好色来啦？&quot;</p>
